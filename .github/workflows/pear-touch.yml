name: Pear Touch

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Name passed to pear-stage-next"
        required: true
        type: choice
        options:
          - prerelease
          - staging
          - nightly
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "latest"

      - name: Install tools
        run: npm install -g corestore-snapshot pear-stage-next

      - name: Touch new key
        run: pear-stage-next --storage=/tmp/store --touch --primary-key=deadbeef01234567deadbeef01234567deadbeef01234567deadbeef01234567 --name=${{ inputs.name }}
