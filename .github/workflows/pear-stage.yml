name: Pear Stage

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "latest"

      - name: Install tools
        run: npm install -g corestore-snapshot pear-stage-next

      - name: Open Snapshot
        run: corestore-snapshot --open --snapshot=./ci/snapshot.json --storage=/tmp/store

      - name: Stage next
        run: pear-stage-next --storage=/tmp/store --target=./build/ --primary=key=deadbeef01234567deadbeef01234567deadbeef01234567deadbeef01234567

      - name: Close Snapshot
        run: corestore-snapshot --close --snapshot=./ci/snapshot.json --storage=/tmp/store

      - name: Create PR with snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="snapshot/update-${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add ci/snapshot.json
          git commit -m "ci: update snapshot.json with new stage"
          git push origin "$BRANCH"
          gh pr create \
            --title "ci: update snapshot.json" \
            --body "Automated snapshot update from workflow run #${{ github.run_number }}." \
            --base "${{ github.ref_name }}" \
            --head "$BRANCH"
